# ============================================================
# Production (On-premise / Ubuntu Server) — Docker Compose
# ============================================================
# ใช้ image เดียวกับ Railway (root Dockerfile, single-container):
#   backend (Express) serve frontend dist ที่ ./public + /api
# Nginx ทำหน้าที่เฉพาะ SSL/HTTPS termination + reverse proxy → app:5001
#
# รัน:   docker compose -f docker-compose.prod.yml up -d --build
# หยุด:  docker compose -f docker-compose.prod.yml down
#
# หมายเหตุ: Railway ไม่ใช้ไฟล์นี้ (Railway build จาก Dockerfile + railway.toml โดยตรง)
#           ไฟล์นี้สำหรับ deploy บนเครื่อง Server ของหน่วยงานเอง (on-premise)
# ============================================================

services:
  # ----------------------------------------------------------
  # App - Backend (Express) + Frontend static (single container)
  # build จาก root Dockerfile ตัวเดียวกับที่ Railway ใช้
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: damrongdham-app
    environment:
      - NODE_ENV=production
      - PORT=5001
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER:-damrongdham_user}
      - DB_PASSWORD=${MYSQL_PASSWORD:-damrongdham_pass}
      - DB_NAME=${MYSQL_DATABASE:-damrongdham_db}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5001}
    volumes:
      - app_uploads:/app/uploads     # เก็บไฟล์แนบถาวร (persistent)
    depends_on:
      db:
        condition: service_healthy
    networks:
      - damrongdham-network
    restart: unless-stopped
    # ไม่เปิด host port ตรงๆ — เข้าผ่าน nginx เท่านั้น
    expose:
      - "5001"

  # ----------------------------------------------------------
  # Database - MySQL 8.0 (internal only, ไม่เปิด host port)
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: damrongdham-db-prod
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-damrongdham_db}
      - MYSQL_USER=${MYSQL_USER:-damrongdham_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-damrongdham_pass}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d   # รันครั้งแรกตอนสร้าง volume เท่านั้น
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - damrongdham-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Nginx - Reverse Proxy + SSL termination
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: damrongdham-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro            # วาง cert.pem / key.pem ที่นี่ (ถ้าใช้ HTTPS)
    depends_on:
      - app
    networks:
      - damrongdham-network
    restart: unless-stopped

networks:
  damrongdham-network:
    driver: bridge
    name: damrongdham-network-prod

volumes:
  mysql_data_prod:
    driver: local
  app_uploads:
    driver: local
