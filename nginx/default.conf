# ============================================================
# Nginx config — On-premise / Ubuntu deployment
# Reverse proxy ทุก request → app:5001 (Express serve ทั้ง frontend + /api)
# ============================================================
# ใช้คู่กับ docker-compose.prod.yml
# เปลี่ยน server_name เป็น domain จริงของหน่วยงาน
# ============================================================

upstream damrongdham_app {
    server app:5001;
}

# ---------- HTTP (port 80) ----------
server {
    listen 80;
    server_name _;   # เปลี่ยนเป็น domain จริง เช่น damrongdham.example.go.th

    # ถ้าเปิดใช้ HTTPS แล้ว ให้ปลด comment บล็อกนี้เพื่อ redirect HTTP → HTTPS
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;   # รองรับไฟล์แนบสูงสุด 10MB (ตรงกับ BR-11)

    location / {
        proxy_pass         http://damrongdham_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

